name: update-formula

# Triggered by the fianulabs/cli pipeline after it publishes the release assets
# to this repo. client_payload is attacker-controllable, so the version is
# strictly validated before use.
on:
  repository_dispatch:
    types: [release]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (X.Y.Z)"
        required: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve and validate version
        id: v
        env:
          RAW_VERSION: ${{ github.event.client_payload.version || github.event.inputs.version }}
        run: |
          set -euo pipefail
          if ! printf '%s' "$RAW_VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Invalid version: '$RAW_VERSION'" >&2
            exit 1
          fi
          echo "version=$RAW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Download release assets and compute checksums
        id: sums
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.v.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p assets
          gh release download "v${VERSION}" --repo "$GITHUB_REPOSITORY" --dir assets \
            --pattern 'cli_Darwin_arm64.tar.gz' --pattern 'cli_Darwin_x86_64.tar.gz' \
            --pattern 'cli_Linux_arm64.tar.gz'  --pattern 'cli_Linux_x86_64.tar.gz'
          sha() { shasum -a 256 "assets/$1" | awk '{print $1}'; }
          {
            echo "darwin_arm=$(sha cli_Darwin_arm64.tar.gz)"
            echo "darwin_amd=$(sha cli_Darwin_x86_64.tar.gz)"
            echo "linux_arm=$(sha cli_Linux_arm64.tar.gz)"
            echo "linux_amd=$(sha cli_Linux_x86_64.tar.gz)"
          } >> "$GITHUB_OUTPUT"

      - name: Render formula
        env:
          VERSION: ${{ steps.v.outputs.version }}
          DARWIN_ARM: ${{ steps.sums.outputs.darwin_arm }}
          DARWIN_AMD: ${{ steps.sums.outputs.darwin_amd }}
          LINUX_ARM: ${{ steps.sums.outputs.linux_arm }}
          LINUX_AMD: ${{ steps.sums.outputs.linux_amd }}
        run: |
          set -euo pipefail
          mkdir -p Formula
          base="https://github.com/${GITHUB_REPOSITORY}/releases/download/v${VERSION}"
          cat > Formula/fianu.rb <<RB
          # Generated by .github/workflows/update-formula.yml. Do not edit by hand.
          class Fianu < Formula
            desc "Fianu CLI — DevOps, gating, and security operations for the Fianu platform"
            homepage "https://fianu.io"
            version "${VERSION}"

            on_macos do
              on_arm do
                url "${base}/cli_Darwin_arm64.tar.gz"
                sha256 "${DARWIN_ARM}"
              end
              on_intel do
                url "${base}/cli_Darwin_x86_64.tar.gz"
                sha256 "${DARWIN_AMD}"
              end
            end

            on_linux do
              on_arm do
                url "${base}/cli_Linux_arm64.tar.gz"
                sha256 "${LINUX_ARM}"
              end
              on_intel do
                url "${base}/cli_Linux_x86_64.tar.gz"
                sha256 "${LINUX_AMD}"
              end
            end

            def install
              bin.install "cli" => "fianu"
            end

            test do
              system "#{bin}/fianu", "version"
            end
          end
          RB

      - name: Commit and push
        env:
          VERSION: ${{ steps.v.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/fianu.rb
          if git diff --cached --quiet; then
            echo "No formula changes."
          else
            git commit -m "fianu ${VERSION}"
            git push
          fi
